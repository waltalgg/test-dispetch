<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
            margin-top: 10px;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .result {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .result.show {
            display: block !important;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .result.error {
            border-left-color: #e74c3c;
            background: #fdeaea;
        }
        .result.success {
            border-left-color: #27ae60;
            background: #f0fdf4;
        }
        .result-header {
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 16px;
            color: #333;
        }
        .result.error .result-header {
            color: #e74c3c;
        }
        .result.success .result-header {
            color: #27ae60;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            font-size: 14px;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .result-label {
            color: #666;
            font-weight: 500;
        }
        .result-value {
            color: #333;
            text-align: right;
            font-weight: 600;
            word-break: break-word;
            text-align: left;
            margin-left: 20px;
        }
        .result.success .result-value {
            color: #27ae60;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }
        .badge.active {
            background: #d4edda;
            color: #155724;
        }
        .badge.inactive {
            background: #f8d7da;
            color: #721c24;
        }
        .example-text {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Форма ввода ИНН</h1>
        <form id="innForm">
            <div class="form-group">
                <span>Введите ИНН организации</span>
                <input
                    type="text"
                    id="innInput"
                    name="inn"
                    placeholder="Например: 7707083893"
                    maxlength="12"
                    pattern="\d{10,12}"
                    required
                >
                <p class="example-text">Внимание: ИНН может быть 10 или 12 символов</p>
            </div>

            <button type="submit" id="submitBtn">Проверить ИНН</button>
            <div class="loading" id="loading">
                <span class="spinner"></span>
                Загружаем данные...
            </div>
        </form>

        <div class="result" id="result">
            <div class="result-header" id="resultHeader"></div>
            <div id="resultContent"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('innForm');
        const innInput = document.getElementById('innInput');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const resultHeader = document.getElementById('resultHeader');
        const resultContent = document.getElementById('resultContent');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const inn = innInput.value.trim();

            if (!inn) {
                showError('Пожалуйста, введите ИНН');
                return;
            }

            submitBtn.disabled = true;
            loading.style.display = 'block';
            result.className = 'result';
            result.style.display = 'none';

            try {
                const response = await fetch('/api/inn/check', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ inn }),
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.error?.message || `Ошибка: HTTP ${response.status}`);
                } else {
                    showSuccess(data.data);
                }
            } catch (error) {
                console.error('Fetch error:', error);
                showError('Ошибка подключения: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        });

        function showError(message) {
            console.log('error:', message);
            resultHeader.textContent = message;
            resultContent.innerHTML = '';
            result.className = 'result show error';
            result.style.display = 'block';
        }

        function showSuccess(data) {
            console.log('success:', data);
            const isActive = data.active;
            const badgeClass = isActive ? 'badge active' : 'badge inactive';
            const badgeText = isActive ? 'Активна' : 'Неактивна';

            resultHeader.innerHTML = `Организация найдена`;
            resultContent.innerHTML = `
                <div class="result-item">
                    <span class="result-label">Название:</span>
                    <span class="result-value">${escapeHtml(data.name)}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">ИНН:</span>
                    <span class="result-value">${escapeHtml(data.inn)}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Статус:</span>
                    <span class="result-value">
                        <span class="${badgeClass}">${badgeText}</span>
                    </span>
                </div>
                <div class="result-item">
                    <span class="result-label">ОКВЭД:</span>
                    <span class="result-value">${data.okved ? escapeHtml(data.okved) : 'Не указан'}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Проверено:</span>
                    <span class="result-value">${new Date(data.checkedAt).toLocaleString('ru-RU')}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">ID записи:</span>
                    <span class="result-value">${data.id}</span>
                </div>
            `;
            result.className = 'result show success';
            result.style.display = 'block';
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Автозагрузка примера при загрузке страницы
        innInput.focus();
    </script>
</body>
</html>
