version: "3.8"

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/app
    environment:
      APP_ENV: dev
      DATABASE_URL: "mysql://app:app@mysql:3306/app?serverVersion=8.4.0&charset=utf8mb4"
    volumes:
      - ./app:/var/www/app
    depends_on:
      - mysql

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
